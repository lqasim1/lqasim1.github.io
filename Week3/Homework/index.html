<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelda Assignment</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body{
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin:0;
        }
        .card{
            width: 500px;
            height:750px;
            background-color: #f4f1ea;
            padding:36px;
            border-radius: 12px;
            box-shadow:10px 10px 25px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        img{
            width:100%;
            height:300px;
            object-fit: cover;
            margin-bottom: 12px;
        }
        h1{
            font-family: 'MedievalSharp',cursive;
            color: #0e3d12;
            margin-top:0;
        }
        p{
            font-size: 18px;
        }
        button{
            background-color: #0e3d12;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
            border-radius:4px;
        }
        button:hover{
            background-color: #1b5e20;
        }
        a:active{
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="./download.jpg" alt="Zelda">
        <h1>Link</h1>
    <p>Hero of Hyrule</p>
    <a href="https://www.zelda.com">
        <button>Play now</button>
    </a>
    </div>
</body>
</html>
